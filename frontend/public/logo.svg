<svg width="100%" viewBox="0 0 680 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dddddd"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3300"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="140" y="10" width="400" height="100" rx="6" fill="#0d0d0d" stroke="#ff2200" stroke-width="1"/>
  <!-- Left red bar -->
  <rect x="140" y="10" width="5" height="100" rx="3" fill="#ff2200"/>

  <!-- MOVIE in white -->
  <text x="168" y="75" font-family="Impact, Arial Black, sans-serif" font-size="56" font-weight="900" fill="url(#whiteGrad)" letter-spacing="4">Movie</text>

  <!-- BAAZAAR in red -->
  <text x="348" y="75" font-family="Impact, Arial Black, sans-serif" font-size="56" font-weight="900" fill="url(#redGrad)" letter-spacing="2">Baazaar</text>

</svg>